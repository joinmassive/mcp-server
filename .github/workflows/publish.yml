name: Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 22 bundles npm 10.x.
      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Verify version match
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          TAG="${GITHUB_REF#refs/tags/v}"
          if [ "$PKG_VERSION" != "$TAG" ] || [ "$MANIFEST_VERSION" != "$TAG" ]; then
            echo "Version mismatch: tag=$TAG package=$PKG_VERSION manifest=$MANIFEST_VERSION" >&2
            exit 1
          fi

      # Build & verify MCPB BEFORE publishing to npm so a broken bundle can't ship.
      - name: Build MCPB bundle
        run: npm run build:mcpb

      - name: Verify MCPB asset exists
        run: |
          shopt -s nullglob
          ASSETS=(dist-mcpb/*.mcpb)
          if [ ${#ASSETS[@]} -eq 0 ]; then
            echo "No .mcpb asset produced under dist-mcpb/" >&2
            exit 1
          fi

      # Auth via npm trusted publishing (OIDC); provenance is generated automatically.
      - name: Publish to npm
        run: npm publish

      - name: Create GitHub Release with MCPB asset
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist-mcpb/*.mcpb
